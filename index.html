<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Poliția Locală București</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/style.css">
</head>
<body>
<main class="app">
  <div class="top">
    <span class="mark" aria-hidden="true"></span>
    <span class="eyebrow">Poliția Locală · București</span>
  </div>

  <!-- STATUS / DETECTING -->
  <section id="status" class="screen is-active" aria-label="Detectare" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <p class="msg" id="statusMsg">Se detectează locația…</p>
    <div class="err-actions">
      <button class="btn-primary" id="retryBtn">Încearcă din nou</button>
      <button class="btn-ghost" id="errManual">Alege sectorul manual</button>
    </div>
  </section>

  <!-- RESULT -->
  <section id="result" class="screen" aria-label="Rezultat" aria-live="polite">
    <div class="result-card" id="card">
      <p class="ghost-num" id="ghostNum" aria-hidden="true">3</p>
      <p class="r-eyebrow">Poliția Locală</p>
      <h2 class="r-sector" id="rSector">Sectorul 3</h2>
      <a class="r-callbtn" id="callLink" href="tel:0219543">
        <span class="num" id="rNum">021 9543</span>
        <span class="ring" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h3l2 5-2.5 1.5a11 11 0 0 0 5 5L15 18l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2Z"/></svg>
        </span>
      </a>
      <p class="r-alt" id="rAlt" hidden></p>
    </div>
    <div class="r-foot">
      <div class="r-112">
        <span>Urgență reală? Formează</span> <a href="tel:112">112</a>
      </div>
      <button class="btn-change" id="changeBtn">Schimbă sectorul</button>
    </div>
  </section>

  <!-- MANUAL PICKER -->
  <section id="manual" class="screen" aria-label="Alege sectorul">
    <div class="m-head">
      <h2 class="m-title">Alege sectorul</h2>
      <p class="m-sub">Atinge sectorul în care te afli.</p>
    </div>
    <div class="grid" id="grid"></div>
    <p class="geo-warn" id="geoWarn" hidden>Nu ai permis încă accesul la locație. Îl poți activa din setările browserului.</p>
    <button class="btn-primary" id="detectAgainBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.2-7-11a7 7 0 1 1 14 0c0 4.8-7 11-7 11Z"/><circle cx="12" cy="10" r="2.6"/></svg>
      Detectează sectorul
    </button>
  </section>
</main>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
